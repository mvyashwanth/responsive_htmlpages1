<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">

<link rel="stylesheet" href="styles.css">

</head>

<body class="auth-bg">

<div class="container vh-100 d-flex justify-content-center align-items-center">

<div class="card auth-card p-4 shadow">

<h3 class="text-center mb-3">Reset Password</h3>

<form id="resetForm">

<div class="mb-3">

<label class="form-label">New Password</label>

<div class="input-group">

<input type="password" class="form-control" id="newPassword" placeholder="Enter new password" required>

<button class="btn btn-outline-secondary" type="button" onclick="togglePassword('newPassword','icon1')">
<i class="bi bi-eye" id="icon1"></i>
</button>

</div>

</div>

<div class="mb-3">

<label class="form-label">Confirm Password</label>

<div class="input-group">

<input type="password" class="form-control" id="confirmPassword" placeholder="Confirm password" required>

<button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirmPassword','icon2')">
<i class="bi bi-eye" id="icon2"></i>
</button>

</div>

</div>

<button type="submit" class="btn btn-primary w-100">
Update Password
</button>


</form>

</div>

</div>

<script>

function togglePassword(inputId, iconId){

let password = document.getElementById(inputId)
let icon = document.getElementById(iconId)

if(password.type === "password"){
password.type = "text"
icon.classList.replace("bi-eye","bi-eye-slash")
}else{
password.type = "password"
icon.classList.replace("bi-eye-slash","bi-eye")
}

}

document.getElementById("resetForm").addEventListener("submit", function(e){

e.preventDefault()

let newPassword = document.getElementById("newPassword").value
let confirmPassword = document.getElementById("confirmPassword").value

if(newPassword !== confirmPassword){
alert("Passwords do not match")
return
}

alert("Password updated successfully!")

window.location.href = "login.html"

})

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
